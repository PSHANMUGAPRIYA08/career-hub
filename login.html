<!DOCTYPE html>
<html>

<head>

    <title>Career Hub Login</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>🚀 Career Hub</h1>

        <h2>Login</h2>

        <input
            type="text"
            id="username"
            placeholder="Username">

        <input
            type="password"
            id="password"
            placeholder="Password">

        <button onclick="login()">
            Login
        </button>
        <p class="demo-login">
    Demo Login:
    <br>
    Username: admin
    <br>
    Password: 1234
</p>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
